# ── HTTP: ACME-челлендж + редирект на HTTPS ───────────────────────────────────
server {
    listen 80;
    server_name tasin-mobile.ru;

    # Let's Encrypt webroot-проверка
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: основное приложение ────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tasin-mobile.ru;

    ssl_certificate     /etc/letsencrypt/live/tasin-mobile.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasin-mobile.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;                       # чтобы Laravel генерил https-ссылки
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
